name: Build & Release

on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]
    release:
        types: [published, created]

jobs:
    build:
        name: Build ${{ matrix.name }}
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                include:
                    - os: windows-latest
                      name: windows-x86_64
                      goarch: amd64
                    - os: ubuntu-latest
                      name: linux-x86_64
                      goarch: amd64
                    - os: macos-latest
                      name: macos-arm64
                      goarch: arm64
                    - os: macos-latest
                      name: macos-x86_64
                      goarch: amd64
            fail-fast: false

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Go
              uses: actions/setup-go@v5
              with:
                  go-version: "stable"
                  check-latest: true

            - name: Install Dependencies (Linux)
              if: runner.os == 'Linux'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev libgtk-3-dev

            - name: Set output filename
              id: vars
              shell: bash
              run: |
                  if [ "${{ matrix.os }}" = "windows-latest" ]; then
                    echo "filename=puush-${{ matrix.name }}.exe" >> $GITHUB_OUTPUT
                  else
                    echo "filename=puush-${{ matrix.name }}" >> $GITHUB_OUTPUT
                  fi

            - name: Build
              env:
                  GOARCH: ${{ matrix.goarch }}
                  CGO_ENABLED: 1
                  MACOSX_DEPLOYMENT_TARGET: "10.13"
              shell: bash
              run: |
                  mkdir -p build
                  go build -ldflags="-s -w" -trimpath -o build/${{ steps.vars.outputs.filename }} ./cmd/desktop

            - name: Upload Artifact
              if: github.event_name != 'release'
              uses: actions/upload-artifact@v4
              with:
                  name: puush-${{ matrix.name }}
                  path: build/${{ steps.vars.outputs.filename }}
                  retention-days: 7

            - name: Upload Release Asset
              if: github.event_name == 'release'
              uses: softprops/action-gh-release@v2
              with:
                  files: build/${{ steps.vars.outputs.filename }}
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
